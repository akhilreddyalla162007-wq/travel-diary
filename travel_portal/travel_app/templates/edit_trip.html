{% extends 'base.html' %}

{% block title %}
Edit Trip
{% endblock %}

{% block content %}

<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="text-center text-primary mb-4">

                        Edit Trip

                    </h2>

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Trip Title

                            </label>

                            <input type="text"
                                   name="title"
                                   class="form-control"
                                   value="{{ trip.title }}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Destination

                            </label>

                            <input type="text"
                                   name="destination"
                                   class="form-control"
                                   value="{{ trip.destination }}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Hotel Name

                            </label>

                            <input type="text"
                                   name="hotel_name"
                                   class="form-control"
                                   value="{{ trip.hotel_name }}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Places Visited

                            </label>

                            <textarea
                                class="form-control"
                                rows="3"
                                name="places_visited">{{ trip.places_visited }}</textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Description

                            </label>

                            <textarea
                                class="form-control"
                                rows="5"
                                name="description">{{ trip.description }}</textarea>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>

                                    Travel Cost

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="travel_cost"
                                    value="{{ trip.travel_cost }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>

                                    Hotel Cost

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="hotel_cost"
                                    value="{{ trip.hotel_cost }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>

                                    Food Cost

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="food_cost"
                                    value="{{ trip.food_cost }}">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>

                                    Other Cost

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="other_cost"
                                    value="{{ trip.other_cost }}">

                            </div>

                        </div>

                        {% if trip.image %}

                        <div class="mb-4 text-center">

                            <img src="{{ trip.image.url }}"
                                 class="img-fluid rounded shadow"
                                 style="max-height:250px;">

                        </div>

                        {% endif %}

                        <div class="mb-4">

                            <label>

                                Change Image

                            </label>

                            <input
                                type="file"
                                name="image"
                                class="form-control">

                        </div>

                        <div class="d-flex justify-content-between">

                            <a href="{% url 'my_trips' %}"
                               class="btn btn-secondary">

                                Cancel

                            </a>

                            <button
                                class="btn btn-primary">

                                Update Trip

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
